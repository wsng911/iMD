<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方案1：经典三栏布局</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    
    .topbar { height: 56px; background: #1a1a1a; color: white; display: flex; align-items: center; padding: 0 20px; gap: 20px; }
    .logo { font-size: 20px; font-weight: 700; }
    .search { flex: 1; max-width: 400px; }
    .search input { width: 100%; padding: 8px 12px; border-radius: 6px; border: none; background: #2a2a2a; color: white; }
    .user-actions { display: flex; gap: 12px; }
    .btn { padding: 8px 16px; border-radius: 6px; border: none; background: #2a2a2a; color: white; cursor: pointer; }
    
    .layout { display: flex; height: calc(100vh - 56px); }
    .sidebar { width: 240px; background: #f5f5f5; border-right: 1px solid #ddd; overflow-y: auto; }
    .main { flex: 1; padding: 32px; overflow-y: auto; background: white; }
    .right-panel { width: 280px; background: #f5f5f5; border-left: 1px solid #ddd; overflow-y: auto; }
    
    .tree-item { padding: 8px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .tree-item:hover { background: #e5e5e5; }
    .tree-item.active { background: #d5d5d5; font-weight: 600; }
    
    .outline-item { padding: 6px 16px; cursor: pointer; font-size: 14px; }
    .outline-item:hover { background: #e5e5e5; }
    .outline-item.h2 { padding-left: 28px; }
    .outline-item.h3 { padding-left: 40px; }
    
    .section-title { padding: 16px; font-weight: 600; color: #666; font-size: 12px; text-transform: uppercase; }
    .tool-btn { margin: 8px 16px; padding: 8px; border: 1px solid #ddd; border-radius: 6px; text-align: center; cursor: pointer; }
    .tool-btn:hover { background: #e5e5e5; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">iMD</div>
    <div class="search"><input type="text" placeholder="搜索文档..."></div>
    <div class="user-actions">
      <button class="btn">用户</button>
      <button class="btn">⚙️</button>
    </div>
  </div>
  
  <div class="layout">
    <div class="sidebar">
      <div class="section-title">文件树</div>
      <div class="tree-item">📁 账号信息</div>
      <div class="tree-item active" style="padding-left: 32px;">📄 邮箱 Email</div>
      <div class="tree-item" style="padding-left: 32px;">📄 支付账号</div>
      <div class="tree-item">📁 网络账户</div>
      <div class="tree-item" style="padding-left: 32px;">📄 华为Flexus</div>
      <div class="tree-item" style="padding-left: 32px;">📄 Oracle</div>
      <div style="padding: 16px;"><button class="btn" style="width: 100%;">+ 新建</button></div>
    </div>
    
    <div class="main">
      <h1>邮箱 Email</h1>
      <p style="margin-top: 20px; line-height: 1.8;">
        这是文档的正文内容区域。支持 Markdown 渲染，代码高亮，图片预览等功能。
      </p>
      <pre style="background: #f5f5f5; padding: 16px; border-radius: 8px; margin-top: 20px;">
账号：example@gmail.com
密码：your_password
      </pre>
    </div>
    
    <div class="right-panel">
      <div class="section-title">大纲</div>
      <div class="outline-item h1">邮箱 Email</div>
      <div class="outline-item h2">Gmail 配置</div>
      <div class="outline-item h3">SMTP 设置</div>
      <div class="outline-item h2">Outlook 配置</div>
      
      <div class="section-title" style="margin-top: 24px;">工具</div>
      <div class="tool-btn">📤 导出</div>
      <div class="tool-btn">🔗 分享</div>
      <div class="tool-btn">📋 复制</div>
    </div>
  </div>
</body>
</html>
