services:
  imd:
    image: wsng911/imd:latest
    restart: unless-stopped
    volumes:
      - ./data:/app/server/data

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - imd
    restart: unless-stopped
